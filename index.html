<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SKiDROSCOPE — too real to be true.">
  <title>SKiDROSCOPE</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --text: #f5f5f0;
      --muted: #8e8e88;
      --line: #f5f5f0;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body { min-height: 100vh; }

    button, input { font: inherit; }

    .screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .gate {
      width: min(760px, 100%);
      text-align: center;
    }

    .statement {
      margin: 0 0 64px;
      font-size: clamp(2.4rem, 8vw, 6.5rem);
      line-height: .9;
      letter-spacing: -.065em;
      text-transform: uppercase;
      font-weight: 900;
    }

    .email-form {
      display: grid;
      grid-template-columns: 1fr auto;
      border-bottom: 2px solid var(--line);
      gap: 16px;
      align-items: center;
    }

    .email-form input {
      min-width: 0;
      padding: 18px 0;
      color: var(--text);
      background: transparent;
      border: 0;
      outline: 0;
      font-size: clamp(1rem, 3vw, 1.45rem);
    }

    .email-form input::placeholder {
      color: var(--muted);
      text-transform: uppercase;
    }

    .email-form button {
      padding: 18px 0 18px 20px;
      color: var(--text);
      background: transparent;
      border: 0;
      cursor: pointer;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .email-form button:hover,
    .email-form button:focus-visible { opacity: .55; }

    .error {
      min-height: 1.3em;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: .8rem;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .site {
      display: none;
      min-height: 100vh;
      padding: 24px;
    }

    .site.visible { display: block; }

    .site-header {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: baseline;
      padding-bottom: 16px;
      border-bottom: 1px solid #333;
    }

    .logo {
      margin: 0;
      font-size: clamp(1.7rem, 5vw, 4rem);
      line-height: 1;
      letter-spacing: -.06em;
      font-weight: 900;
    }

    .tagline {
      margin: 0;
      color: var(--muted);
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    .hero {
      min-height: calc(100vh - 110px);
      display: grid;
      align-content: end;
      padding: 10vh 0 3vh;
    }

    .hero h2 {
      max-width: 1100px;
      margin: 0;
      font-size: clamp(3.5rem, 13vw, 11rem);
      line-height: .79;
      letter-spacing: -.075em;
      text-transform: uppercase;
      font-weight: 900;
    }

    .hero p {
      max-width: 520px;
      margin: 34px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.25rem);
      line-height: 1.4;
    }

    @media (max-width: 620px) {
      .statement { margin-bottom: 46px; }
      .email-form { grid-template-columns: 1fr; gap: 0; }
      .email-form button { padding: 16px 0; text-align: left; }
      .site-header { display: block; }
      .tagline { margin-top: 8px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="screen" id="gate" aria-labelledby="gate-title">
      <div class="gate">
        <h1 class="statement" id="gate-title">If you ain’t paying,<br>you’re what’s being sold.</h1>
        <form class="email-form" id="email-form" novalidate>
          <label for="email" hidden>Email address</label>
          <input id="email" name="email" type="email" autocomplete="email" placeholder="Your email address" required>
          <button type="submit">Enter →</button>
        </form>
        <p class="error" id="error" role="alert" aria-live="polite"></p>
      </div>
    </section>

    <section class="site" id="site" aria-hidden="true">
      <header class="site-header">
        <h1 class="logo">SKiDROSCOPE</h1>
        <p class="tagline">Too real to be true</p>
      </header>
      <div class="hero">
        <h2>Welcome<br>to the other<br>side.</h2>
        <p>An independent editorial territory from Skid Row—where the city stops pretending not to see.</p>
      </div>
    </section>
  </main>

  <script>
    const gate = document.getElementById('gate');
    const site = document.getElementById('site');
    const form = document.getElementById('email-form');
    const emailInput = document.getElementById('email');
    const error = document.getElementById('error');

    function enterSite() {
      gate.style.display = 'none';
      site.classList.add('visible');
      site.setAttribute('aria-hidden', 'false');
      document.title = 'SKiDROSCOPE — Too Real to Be True';
    }

    if (localStorage.getItem('skidroscope_access') === 'granted') {
      enterSite();
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const email = emailInput.value.trim();

      if (!email || !emailInput.checkValidity()) {
        error.textContent = 'Drop a valid email first.';
        emailInput.focus();
        return;
      }

      localStorage.setItem('skidroscope_access', 'granted');
      localStorage.setItem('skidroscope_email', email);
      enterSite();
    });
  </script>
</body>
</html>
