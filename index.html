<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>SKiDROSCOPE</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#050505;color:#f5f5f0;font-family:Arial,Helvetica,sans-serif}
    body{display:flex;min-height:100vh;flex-direction:column}
    main{flex:1;display:grid;place-items:center;padding:48px 28px}
    .gate{width:min(760px,100%);text-align:center}
    h1{margin:0 0 64px;font-size:clamp(2.4rem,8vw,6.5rem);line-height:.9;letter-spacing:-.065em;text-transform:uppercase;font-weight:900}
    .signup-form{display:grid;grid-template-columns:1fr auto;border-bottom:2px solid #f5f5f0;gap:16px;align-items:center}
    input,button{font:inherit}
    .email-input{min-width:0;padding:18px 0;color:#f5f5f0;background:transparent;border:0;outline:0;font-size:clamp(1rem,3vw,1.45rem)}
    .email-input::placeholder{color:#8e8e88;text-transform:uppercase}
    button{padding:18px 0 18px 20px;color:#f5f5f0;background:transparent;border:0;cursor:pointer;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
    button:disabled{cursor:wait;opacity:.55}
    .consent{grid-column:1/-1;display:flex;gap:10px;align-items:flex-start;margin:18px 0 0;text-align:left;color:#a6a69f;font-size:.78rem;line-height:1.45;letter-spacing:.03em}
    .consent input{margin-top:2px;accent-color:#f5f5f0}
    .message{grid-column:1/-1;min-height:1.3em;margin:14px 0 0;color:#8e8e88;font-size:.8rem;letter-spacing:.08em;text-transform:uppercase}
    .message.success{color:#f5f5f0}
    footer{border-top:1px solid #2a2a28;padding:34px 28px 40px}
    .footer-inner{width:min(760px,100%);margin:0 auto}
    .footer-title{margin:0 0 18px;font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;color:#a6a69f}
    .footer-form .email-input{font-size:1rem;padding:14px 0}
    .footer-form button{padding:14px 0 14px 20px;font-size:.78rem}
    @media(max-width:620px){
      h1{margin-bottom:46px}
      .signup-form{grid-template-columns:1fr;gap:0}
      button{padding:16px 0;text-align:left}
      footer{padding-inline:22px}
    }
  </style>
</head>
<body>
  <main>
    <div class="gate">
      <h1>If you ain’t paying,<br>you’re what’s being sold.</h1>
      <form class="signup-form" novalidate data-signup-form>
        <input class="email-input" type="email" autocomplete="email" placeholder="Your email address" required aria-label="Email address">
        <button type="submit">Subscribe →</button>
        <label class="consent">
          <input type="checkbox" required>
          <span>I agree to receive occasional SKiDROSCOPE editorial updates. My address will not be sold or shared.</span>
        </label>
        <p class="message" role="alert" aria-live="polite"></p>
      </form>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <p class="footer-title">Stay inside the signal</p>
      <form class="signup-form footer-form" novalidate data-signup-form>
        <input class="email-input" type="email" autocomplete="email" placeholder="Your email address" required aria-label="Email address">
        <button type="submit">Subscribe →</button>
        <label class="consent">
          <input type="checkbox" required>
          <span>I agree to receive occasional SKiDROSCOPE editorial updates. My address will not be sold or shared.</span>
        </label>
        <p class="message" role="alert" aria-live="polite"></p>
      </form>
    </div>
  </footer>

  <script>
    const endpoint='https://guujnlydcqhpedmcrtnz.supabase.co/functions/v1/subscribe';

    async function saveSubscriber(email){
      const controller=new AbortController();
      const timeout=setTimeout(()=>controller.abort(),12000);
      try{
        const response=await fetch(endpoint+'?v=20260717-2',{
          method:'POST',
          mode:'cors',
          cache:'no-store',
          credentials:'omit',
          headers:{'Content-Type':'application/json','Accept':'application/json'},
          body:JSON.stringify({email,consent:true,source:'github_pages'}),
          signal:controller.signal
        });
        const result=await response.json().catch(()=>({}));
        if(!response.ok) throw new Error(result.error||'Subscription could not be completed.');
        return result;
      } finally {
        clearTimeout(timeout);
      }
    }

    document.querySelectorAll('[data-signup-form]').forEach(form=>{
      const email=form.querySelector('input[type="email"]');
      const consent=form.querySelector('input[type="checkbox"]');
      const message=form.querySelector('.message');
      const submit=form.querySelector('button[type="submit"]');

      form.addEventListener('submit',async event=>{
        event.preventDefault();
        event.stopPropagation();
        message.classList.remove('success');
        message.textContent='';

        const normalized=email.value.trim().toLowerCase();
        if(!normalized||!email.checkValidity()){
          message.textContent='Enter a valid email address.';
          email.focus();
          return;
        }
        if(!consent.checked){
          message.textContent='Check the consent box, then press Subscribe.';
          consent.focus();
          return;
        }

        submit.disabled=true;
        submit.textContent='Saving…';

        try{
          await saveSubscriber(normalized);
          localStorage.setItem('skidroscope_email',normalized);
          message.classList.add('success');
          message.textContent='Address saved. Welcome to SKiDROSCOPE.';
          submit.textContent='Saved ✓';
          email.disabled=true;
          consent.disabled=true;

          document.querySelectorAll('[data-signup-form]').forEach(otherForm=>{
            const otherEmail=otherForm.querySelector('input[type="email"]');
            const otherConsent=otherForm.querySelector('input[type="checkbox"]');
            const otherMessage=otherForm.querySelector('.message');
            const otherSubmit=otherForm.querySelector('button[type="submit"]');
            otherEmail.value=normalized;
            otherEmail.disabled=true;
            otherConsent.checked=true;
            otherConsent.disabled=true;
            otherSubmit.disabled=true;
            otherSubmit.textContent='Saved ✓';
            otherMessage.classList.add('success');
            otherMessage.textContent='Address saved. Welcome to SKiDROSCOPE.';
          });
        }catch(error){
          console.error('SKiDROSCOPE subscription error',error);
          message.textContent=error.name==='AbortError'?'Connection timed out. Try again.':(error.message||'Subscription could not be completed.');
          submit.disabled=false;
          submit.textContent='Subscribe →';
        }
      });
    });
  </script>
</body>
</html>
