name: Deploy SKiDROSCOPE

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download original SKiDROSCOPE website
        run: |
          curl -L --fail --retry 5 --retry-delay 2 "https://drive.usercontent.google.com/download?id=1xl7lQkKm7KyydWXXuQAMhYUlkX7QyM_c&export=download&confirm=t" -o site.tar.gz
          mkdir -p public
          tar -xzf site.tar.gz -C public
          test -f public/index.html
          mv public/index.html public/home.html
          cp index.html public/index.html
          rm -rf public/.github public/source

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Publish website
        id: deployment
        uses: actions/deploy-pages@v4
