name: Deploy SKiDROSCOPE

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Download SKiDROSCOPE website
        run: |
          curl -L --fail --retry 5 --retry-delay 2 "https://drive.usercontent.google.com/download?id=1xl7lQkKm7KyydWXXuQAMhYUlkX7QyM_c&export=download&confirm=t" -o site.tar.gz
      - name: Prepare website
        run: |
          mkdir -p public
          tar -xzf site.tar.gz -C public
          rm -rf public/.github public/source
          test -f public/index.html
          test -f public/links.html
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Publish website
        id: deployment
        uses: actions/deploy-pages@v4

# GitHub Pages activation confirmed.
# Article body now uses PNG picture files only: Article01.png and Article02.png.
